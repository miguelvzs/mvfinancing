<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MV Financing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0d;--sf:#141415;--sf2:#1c1c1e;--sf3:#222224;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --tx:#f0f0f0;--mu:#6b6b72;--mu2:#3a3a40;
  --gr:#34c759;--gr-d:rgba(52,199,89,0.13);
  --re:#ff453a;--re-d:rgba(255,69,58,0.13);
  --am:#ffd60a;--am-d:rgba(255,214,10,0.11);
  --bl:#0a84ff;--bl-d:rgba(10,132,255,0.13);
  --pu:#bf5af2;--pu-d:rgba(191,90,242,0.13);
  --tl:#32d0c4;
  --r:12px;--rs:8px;
}
html{font-size:15px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:224px;flex-shrink:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:24px 0;position:fixed;height:100vh;top:0;left:0;background:var(--bg);z-index:20;overflow-y:auto}
.logo{padding:0 20px 22px;border-bottom:1px solid var(--bd);margin-bottom:4px}
.logo-row{display:flex;align-items:center;gap:9px}
.mvb{width:26px;height:26px;background:var(--tx);color:var(--bg);font-size:10px;font-weight:700;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-name{font-size:15px;font-weight:500;color:var(--tx)}
.logo-sub{font-size:11px;color:var(--mu);margin-top:4px;padding-left:35px}
.nav-sect{padding:10px 0 2px}
.nav-lbl{font-size:10px;color:var(--mu2);letter-spacing:.09em;text-transform:uppercase;padding:0 20px 7px;display:block}
.nv{display:flex;align-items:center;gap:9px;padding:8px 20px;font-size:13.5px;color:var(--mu);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:color .15s;font-family:'DM Sans',sans-serif}
.nv:hover{color:var(--tx)}.nv.on{color:var(--tx)}
.ndot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.35;flex-shrink:0}
.nv.on .ndot{opacity:1}
.sf-foot{padding:16px 20px 0;margin-top:auto;font-size:11px;color:var(--mu2);border-top:1px solid var(--bd)}

/* MAIN */
.main{margin-left:224px;flex:1;padding:32px 40px;max-width:1160px}
.page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--bd)}
.pg-title{font-size:19px;font-weight:400;letter-spacing:-.02em}
.pg-sub{font-size:12px;color:var(--mu);margin-top:3px}
.hd-acts{display:flex;align-items:center;gap:9px}

/* MONTH NAV */
.mnav{display:flex;align-items:center;gap:10px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:7px 13px}
.mnav button{background:none;border:none;color:var(--mu);cursor:pointer;font-size:15px;line-height:1;padding:0 3px;transition:color .15s}
.mnav button:hover{color:var(--tx)}
.mnav span{font-size:13px;min-width:115px;text-align:center}

/* PAGES */
.page{display:none}.page.on{display:block}

/* SUMMARY CARDS */
.sum{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:20px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;transition:border-color .15s}
.sc:hover{border-color:var(--bd2)}
.sc-lbl{font-size:10px;color:var(--mu);letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px}
.sc-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:300;letter-spacing:-.02em}
.sc-val.g{color:var(--gr)}.sc-val.r{color:var(--re)}.sc-val.a{color:var(--am)}.sc-val.b{color:var(--bl)}.sc-val.p{color:var(--pu)}
.sc-sub{font-size:10px;color:var(--mu);margin-top:5px}

/* PANELS */
.panel{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.panel-hd{padding:14px 17px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:13px;font-weight:500}
.adbtn{font-size:11.5px;color:var(--mu);background:none;border:1px solid var(--bd);border-radius:6px;padding:4px 11px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.adbtn:hover{border-color:var(--bd2);color:var(--tx)}

/* LIST ITEMS */
.li{display:flex;align-items:center;gap:10px;padding:9px 17px;transition:background .1s}
.li:hover{background:var(--sf2)}
.lidot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.lii{flex:1;min-width:0}
.lin{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lic{font-size:11px;color:var(--mu);margin-top:1px}
.lia{font-family:'DM Mono',monospace;font-size:13px;font-weight:300;white-space:nowrap}
.lia.g{color:var(--gr)}.lia.r{color:var(--re)}.lia.b{color:var(--bl)}.lia.p{color:var(--pu)}
.xb{background:none;border:none;color:transparent;font-size:15px;cursor:pointer;padding:0 3px;transition:color .15s;line-height:1}
.li:hover .xb,.bill-row:hover .xb{color:var(--mu2)}
.xb:hover{color:var(--re)!important}
.emp{padding:28px 17px;text-align:center;color:var(--mu);font-size:13px}

/* SALARY */
.sal{display:flex;align-items:center;gap:11px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 17px;margin-bottom:15px}
.sal-lbl{font-size:10px;color:var(--mu);letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
.sal-sep{width:1px;height:17px;background:var(--bd);flex-shrink:0}
.sal input{flex:1;background:none;border:none;outline:none;font-family:'DM Mono',monospace;font-size:17px;font-weight:300;color:var(--gr);min-width:0}
.sal-ok{font-size:11px;color:var(--gr);opacity:0;transition:opacity .3s;white-space:nowrap}
.sal-ok.show{opacity:1}
.sal button{font-size:11px;color:var(--mu);background:none;border:1px solid var(--bd);border-radius:6px;padding:5px 12px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.sal button:hover{border-color:var(--bd2);color:var(--tx)}

/* OVERVIEW LAYOUT */
.ov-grid{display:grid;grid-template-columns:1fr 1fr 320px;gap:13px}
.ov-lists{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;grid-column:span 2;display:grid;grid-template-columns:1fr 1fr}
.ov-lists .div-r{border-right:1px solid var(--bd)}
.ov-chart{display:flex;flex-direction:column}

/* BILLS */
.bill-row{display:flex;align-items:center;gap:11px;padding:12px 17px;border-bottom:1px solid var(--bd);transition:background .1s}
.bill-row:last-child{border-bottom:none}
.bill-row:hover{background:var(--sf2)}
.bchk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--bd2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.bchk:hover{border-color:var(--gr)}
.bchk.on{background:var(--gr);border-color:var(--gr)}
.bchk.on::after{content:'';width:6px;height:6px;border-radius:50%;background:#000}
.bico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.binfo{flex:1;min-width:0}
.bname{font-size:13.5px}.bname.pd{text-decoration:line-through;color:var(--mu)}
.bmeta{font-size:11px;color:var(--mu);margin-top:2px}
.tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;white-space:nowrap}
.tag.ov{background:var(--re-d);color:var(--re)}.tag.sn{background:var(--am-d);color:var(--am)}.tag.ok{background:var(--gr-d);color:var(--gr)}.tag.paid{background:var(--sf2);color:var(--mu)}
.bamt{font-family:'DM Mono',monospace;font-size:14px;font-weight:300;white-space:nowrap}
.bprog{height:2px;background:var(--mu2);border-radius:1px;overflow:hidden;margin:0 17px 0 56px}
.bpfil{height:100%;border-radius:1px;transition:width .3s}

/* GOALS */
.goal-it{padding:17px;border-bottom:1px solid var(--bd)}
.goal-it:last-child{border-bottom:none}
.goal-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px}
.goal-name{font-size:13.5px}
.goal-tag-sm{font-size:10px;color:var(--mu);background:var(--sf2);padding:2px 7px;border-radius:4px}
.goal-pct{font-family:'DM Mono',monospace;font-size:13px;color:var(--mu)}
.ptk{height:2px;background:var(--mu2);border-radius:1px;overflow:hidden}
.pfl{height:100%;border-radius:1px;background:var(--tx);transition:width .4s ease}
.g-amts{display:flex;justify-content:space-between;font-size:11px;color:var(--mu);margin-top:7px}
.g-acts{display:flex;gap:7px;margin-top:9px}
.gbtn{font-size:11px;background:none;border:1px solid var(--bd);border-radius:5px;padding:4px 10px;cursor:pointer;color:var(--mu);font-family:'DM Sans',sans-serif;transition:all .15s}
.gbtn:hover{border-color:var(--bd2);color:var(--tx)}
.gbtn.del:hover{color:var(--re);border-color:var(--re-d)}

/* INVEST */
.inv-sum{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:15px}
.inv-row{display:flex;align-items:center;gap:11px;padding:12px 17px;border-bottom:1px solid var(--bd);transition:background .1s}
.inv-row:last-child{border-bottom:none}
.inv-row:hover{background:var(--sf2)}
.inv-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.inv-inf{flex:1;min-width:0}
.inv-name{font-size:13.5px}.inv-type{font-size:11px;color:var(--mu);margin-top:1px}
.inv-r{text-align:right}
.inv-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:300}
.inv-gain{font-size:11px;margin-top:2px}
.inv-gain.pos{color:var(--gr)}.inv-gain.neg{color:var(--re)}

/* HISTORY */
.hist-row{display:flex;align-items:center;gap:11px;padding:10px 17px;border-bottom:1px solid var(--bd)}
.hist-row:last-child{border-bottom:none}
.hist-ico{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.hist-inf{flex:1;min-width:0}
.hist-n{font-size:13px}.hist-m{font-size:11px;color:var(--mu);margin-top:1px}
.hist-a{font-family:'DM Mono',monospace;font-size:13.5px;font-weight:300}
.flt-row{display:flex;gap:7px;padding:11px 17px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.ftag{font-size:11px;padding:4px 10px;border:1px solid var(--bd);border-radius:5px;cursor:pointer;background:none;color:var(--mu);font-family:'DM Sans',sans-serif;transition:all .15s}
.ftag:hover,.ftag.on{border-color:var(--bd2);color:var(--tx);background:var(--sf2)}

/* MODAL */
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center}
.ovl.open{display:flex}
.modal{background:var(--sf);border:1px solid var(--bd2);border-radius:16px;padding:24px;width:380px;max-width:94vw;animation:su .18s ease}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-size:16px;font-weight:400;margin-bottom:20px}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.fld input,.fld select{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 11px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.fld input:focus,.fld select:focus{border-color:var(--bd2)}
.fld select option{background:var(--sf2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.mcnl{background:none;border:1px solid var(--bd);border-radius:var(--rs);color:var(--mu);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 15px;cursor:pointer;transition:all .15s}
.mcnl:hover{border-color:var(--bd2);color:var(--tx)}
.msave{background:var(--tx);border:none;border-radius:var(--rs);color:#000;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 18px;cursor:pointer;transition:opacity .15s}
.msave:hover{opacity:.85}

/* TOAST */
.toast{position:fixed;bottom:26px;right:26px;background:var(--sf2);border:1px solid var(--bd2);border-radius:10px;padding:11px 18px;font-size:13px;color:var(--tx);z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* CHART */
.chart-wrap{position:relative;padding:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--mu2);border-radius:2px}
</style>
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div class="logo">
    <div class="logo-row"><div class="mvb">MV</div><span class="logo-name">MV Financing</span></div>
    <div class="logo-sub">by MV Corp</div>
  </div>
  <div class="nav-sect">
    <span class="nav-lbl">Geral</span>
    <button class="nv on" data-page="overview"><span class="ndot"></span>Visão Geral</button>
    <button class="nv" data-page="bills"><span class="ndot"></span>A Pagar</button>
    <button class="nv" data-page="history"><span class="ndot"></span>Histórico</button>
  </div>
  <div class="nav-sect" style="border-top:1px solid var(--bd)">
    <span class="nav-lbl">Planejamento</span>
    <button class="nv" data-page="goals"><span class="ndot"></span>Metas</button>
    <button class="nv" data-page="invest"><span class="ndot"></span>Investimentos</button>
  </div>
  <div class="nav-sect" style="border-top:1px solid var(--bd)">
    <span class="nav-lbl">Exportar</span>
    <button class="nv" onclick="exportExcel()"><span class="ndot"></span>Planilha Excel</button>
    <button class="nv" onclick="exportReport()"><span class="ndot"></span>Relatório Mensal</button>
  </div>
  <div class="sf-foot">Dados salvos localmente</div>
</aside>

<main class="main">
  <div class="page-hd">
    <div><div class="pg-title" id="pgTitle">Visão Geral</div><div class="pg-sub" id="pgSub"></div></div>
    <div class="hd-acts">
      <div class="mnav">
        <button onclick="chMon(-1)">&#8249;</button>
        <span id="monLabel"></span>
        <button onclick="chMon(1)">&#8250;</button>
      </div>
    </div>
  </div>

  <!-- OVERVIEW -->
  <div id="page-overview" class="page on">
    <div class="sal">
      <span class="sal-lbl">Renda mensal</span>
      <div class="sal-sep"></div>
      <input type="number" id="salIn" placeholder="0,00" step="0.01" onkeydown="if(event.key==='Enter')setSalary()">
      <span class="sal-ok" id="salOk">&#10003; Salvo</span>
      <button onclick="setSalary()">Salvar</button>
    </div>
    <div class="sum" id="sumCards"></div>
    <div class="ov-grid">
      <div class="ov-lists">
        <div class="div-r">
          <div class="panel-hd"><span class="panel-title">Receitas</span><button class="adbtn" onclick="openModal('income')">+ Adicionar</button></div>
          <div id="incList"></div>
        </div>
        <div>
          <div class="panel-hd"><span class="panel-title">Despesas</span><button class="adbtn" onclick="openModal('expense')">+ Adicionar</button></div>
          <div id="expList"></div>
        </div>
      </div>
      <div class="ov-chart panel">
        <div class="panel-hd"><span class="panel-title">Por categoria</span></div>
        <div class="chart-wrap" style="flex:1;min-height:210px"><canvas id="catChart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- BILLS -->
  <div id="page-bills" class="page">
    <div class="sum" id="billSum" style="grid-template-columns:repeat(3,1fr);margin-bottom:15px"></div>
    <div class="panel">
      <div class="panel-hd"><span class="panel-title">Contas do mês</span><button class="adbtn" onclick="openModal('bill')">+ Nova conta</button></div>
      <div id="billsList"></div>
    </div>
  </div>

  <!-- GOALS -->
  <div id="page-goals" class="page">
    <div class="panel">
      <div class="panel-hd"><span class="panel-title">Metas de economia</span><button class="adbtn" onclick="openModal('goal')">+ Nova meta</button></div>
      <div id="goalsList"></div>
    </div>
  </div>

  <!-- INVEST -->
  <div id="page-invest" class="page">
    <div class="inv-sum" id="invSum"></div>
    <div class="panel" style="margin-bottom:13px">
      <div class="panel-hd"><span class="panel-title">Carteira</span><button class="adbtn" onclick="openModal('invest')">+ Adicionar ativo</button></div>
      <div id="invList"></div>
    </div>
    <div class="panel">
      <div class="panel-hd"><span class="panel-title">Distribuição por tipo</span></div>
      <div class="chart-wrap" style="height:200px"><canvas id="invChart"></canvas></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="page-history" class="page">
    <div class="panel" style="margin-bottom:13px">
      <div class="panel-hd"><span class="panel-title">Receita vs. Gastos — 6 meses</span></div>
      <div class="chart-wrap" style="height:190px"><canvas id="histChart"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-hd"><span class="panel-title">Movimentações</span></div>
      <div class="flt-row" id="fltRow"></div>
      <div id="histList"></div>
    </div>
  </div>
</main>
</div>

<div class="ovl" id="ovl">
  <div class="modal">
    <div class="modal-title" id="mTitle"></div>
    <div id="mBody"></div>
    <div class="modal-acts">
      <button class="mcnl" onclick="closeModal()">Cancelar</button>
      <button class="msave" onclick="saveModal()">Salvar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const EC=['Moradia','Alimentação','Transporte','Saúde','Lazer','Educação','Assinaturas','Vestuário','Outros'];
const IC=['Salário','Freelance','Investimentos','Extra','Outros'];
const IT=['Renda Fixa','Ações','FIIs','Criptomoedas','Tesouro Direto','CDB/LCI/LCA','Poupança','Outros'];
const CL={'Moradia':'#0a84ff','Alimentação':'#34c759','Transporte':'#ffd60a','Saúde':'#ff9f0a','Lazer':'#bf5af2','Educação':'#ff375f','Assinaturas':'#64d2ff','Vestuário':'#ff6961','Outros':'#6b6b72','Salário':'#34c759','Freelance':'#30d158','Investimentos':'#0a84ff','Extra':'#ffd60a','Renda Fixa':'#0a84ff','Ações':'#34c759','FIIs':'#bf5af2','Criptomoedas':'#ffd60a','Tesouro Direto':'#32d0c4','CDB/LCI/LCA':'#ff9f0a','Poupança':'#64d2ff'};
const IC2={'Moradia':'🏠','Alimentação':'🛒','Transporte':'🚗','Saúde':'💊','Lazer':'🎮','Educação':'📚','Assinaturas':'📡','Vestuário':'👕','Outros':'📌','Salário':'💼','Freelance':'💻','Investimentos':'📈','Extra':'⚡','Renda Fixa':'🔒','Ações':'📊','FIIs':'🏢','Criptomoedas':'₿','Tesouro Direto':'🏛','CDB/LCI/LCA':'🏦','Poupança':'💰'};

let cm=new Date().getMonth(),cy=new Date().getFullYear();
let mtype='',curPage='overview',hfilt='all';
let catCI=null,histCI=null,invCI=null;

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const mk=(m,y)=>`mvf3_${y??cy}_${m??cm}`;
function gd(m,y){const r=localStorage.getItem(mk(m,y));return r?JSON.parse(r):{salary:0,income:[],expenses:[],bills:[]}}
function sd(d,m,y){localStorage.setItem(mk(m,y),JSON.stringify(d))}
function gg(){return JSON.parse(localStorage.getItem('mvf3_goals')||'[]')}
function sg(g){localStorage.setItem('mvf3_goals',JSON.stringify(g))}
function gi(){return JSON.parse(localStorage.getItem('mvf3_invest')||'[]')}
function si(i){localStorage.setItem('mvf3_invest',JSON.stringify(i))}

const brl=v=>'R$\u00a0'+parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const ppct=v=>(v>=0?'+':'')+parseFloat(v||0).toFixed(2)+'%';

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}

// NAV
document.querySelectorAll('.nv[data-page]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.nv').forEach(n=>n.classList.remove('on'));
    b.classList.add('on');
    showPage(b.dataset.page);
  });
});

function showPage(id){
  curPage=id;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('page-'+id)?.classList.add('on');
  const titles={overview:'Visão Geral',bills:'A Pagar',goals:'Metas',invest:'Investimentos',history:'Histórico'};
  document.getElementById('pgTitle').textContent=titles[id]||id;
  render();
}

function chMon(d){cm+=d;if(cm>11){cm=0;cy++;}if(cm<0){cm=11;cy--;}render();}

function render(){
  document.getElementById('monLabel').textContent=MN[cm]+' '+cy;
  document.getElementById('pgSub').textContent=MN[cm]+' '+cy;
  const data=gd();
  document.getElementById('salIn').value=data.salary||'';
  renderSum(data);
  renderInc(data);renderExp(data);
  renderBills(data);renderGoals();renderInvest();renderHist(data);
  if(curPage==='overview')setTimeout(()=>renderCatChart(data),40);
  if(curPage==='history')setTimeout(()=>renderHistChart(),40);
  if(curPage==='invest')setTimeout(()=>renderInvChart(),40);
}

function renderSum(data){
  const inc=data.income.reduce((a,b)=>a+parseFloat(b.value),0);
  const exp=data.expenses.reduce((a,b)=>a+parseFloat(b.value),0);
  const bpd=data.bills.filter(b=>b.paid).reduce((a,b)=>a+parseFloat(b.value),0);
  const bpn=data.bills.filter(b=>!b.paid).reduce((a,b)=>a+parseFloat(b.value),0);
  const bal=inc-exp-bpd;
  document.getElementById('sumCards').innerHTML=`
    <div class="sc"><div class="sc-lbl">Receita</div><div class="sc-val g">${brl(inc)}</div><div class="sc-sub">${data.income.length} entrada${data.income.length!==1?'s':''}</div></div>
    <div class="sc"><div class="sc-lbl">Gastos pagos</div><div class="sc-val r">${brl(exp+bpd)}</div><div class="sc-sub">${data.expenses.length+data.bills.filter(b=>b.paid).length} lançamento${(data.expenses.length+data.bills.filter(b=>b.paid).length)!==1?'s':''}</div></div>
    <div class="sc"><div class="sc-lbl">A pagar</div><div class="sc-val a">${brl(bpn)}</div><div class="sc-sub">${data.bills.filter(b=>!b.paid).length} pendente${data.bills.filter(b=>!b.paid).length!==1?'s':''}</div></div>
    <div class="sc"><div class="sc-lbl">Saldo livre</div><div class="sc-val ${bal>=0?'g':'r'}">${brl(bal)}</div><div class="sc-sub">${bal>=0?'Disponível':'Atenção: déficit'}</div></div>`;
}

function renderInc(data){
  const el=document.getElementById('incList');
  if(!data.income.length){el.innerHTML='<div class="emp">Nenhuma receita</div>';return;}
  el.innerHTML=data.income.map(i=>`<div class="li"><div class="lidot" style="background:${CL[i.cat]||'#6b'}"></div><div class="lii"><div class="lin">${i.name}</div><div class="lic">${i.cat}</div></div><div class="lia g">${brl(i.value)}</div><button class="xb" onclick="delIt('income','${i.id}')">&#215;</button></div>`).join('');
}

function renderExp(data){
  const el=document.getElementById('expList');
  if(!data.expenses.length){el.innerHTML='<div class="emp">Nenhuma despesa</div>';return;}
  el.innerHTML=data.expenses.map(e=>`<div class="li"><div class="lidot" style="background:${CL[e.cat]||'#6b'}"></div><div class="lii"><div class="lin">${e.name}</div><div class="lic">${e.cat}</div></div><div class="lia r">${brl(e.value)}</div><button class="xb" onclick="delIt('expenses','${e.id}')">&#215;</button></div>`).join('');
}

function dtag(ds,paid){
  if(paid)return'<span class="tag paid">Pago</span>';
  if(!ds)return'';
  const d=Math.round((new Date(ds+'T12:00:00')-new Date())/86400000);
  if(d<0)return`<span class="tag ov">Vencido ${Math.abs(d)}d</span>`;
  if(d<=5)return`<span class="tag sn">${d}d</span>`;
  return`<span class="tag ok">${d}d</span>`;
}
function dcl(ds){const d=Math.round((new Date(ds+'T12:00:00')-new Date())/86400000);return d<0?'var(--re)':d<=5?'var(--am)':'var(--gr)';}

function renderBills(data){
  const el=document.getElementById('billsList');
  if(!data.bills.length){el.innerHTML='<div class="emp">Nenhuma conta cadastrada</div>';return;}
  const sorted=[...data.bills].sort((a,b)=>{if(a.paid!==b.paid)return a.paid?1:-1;return(a.dueDate||'')>(b.dueDate||'')?1:-1;});
  el.innerHTML=sorted.map(b=>`<div>
    <div class="bill-row">
      <div class="bchk ${b.paid?'on':''}" onclick="togBill('${b.id}')"></div>
      <div class="bico" style="background:${CL[b.cat]||'#6b6b72'}20">${IC2[b.cat]||'📌'}</div>
      <div class="binfo"><div class="bname ${b.paid?'pd':''}">${b.name}</div><div class="bmeta">${b.cat}${b.dueDate?' · '+new Date(b.dueDate+'T12:00:00').toLocaleDateString('pt-BR'):''}</div></div>
      ${dtag(b.dueDate,b.paid)}
      <div class="bamt" style="color:${b.paid?'var(--mu)':'var(--tx)'}">${brl(b.value)}</div>
      <button class="xb" onclick="delIt('bills','${b.id}')" style="color:var(--mu2)">&#215;</button>
    </div>
    ${!b.paid&&b.dueDate?`<div class="bprog" style="margin-bottom:8px"><div class="bpfil" style="width:${Math.min(100,Math.max(4,100-Math.round((new Date(b.dueDate+'T12:00:00')-new Date())/86400000)*6))}%;background:${dcl(b.dueDate)}"></div></div>`:''}
  </div>`).join('');

  const bs=document.getElementById('billSum');
  if(bs){
    const tot=data.bills.reduce((a,b)=>a+parseFloat(b.value),0);
    const paid=data.bills.filter(b=>b.paid).reduce((a,b)=>a+parseFloat(b.value),0);
    const pend=data.bills.filter(b=>!b.paid).reduce((a,b)=>a+parseFloat(b.value),0);
    bs.innerHTML=`<div class="sc"><div class="sc-lbl">Total do mês</div><div class="sc-val">${brl(tot)}</div><div class="sc-sub">${data.bills.length} conta${data.bills.length!==1?'s':''}</div></div>
    <div class="sc"><div class="sc-lbl">Pago</div><div class="sc-val g">${brl(paid)}</div><div class="sc-sub">${data.bills.filter(b=>b.paid).length} conta${data.bills.filter(b=>b.paid).length!==1?'s':''}</div></div>
    <div class="sc"><div class="sc-lbl">Pendente</div><div class="sc-val a">${brl(pend)}</div><div class="sc-sub">${data.bills.filter(b=>!b.paid).length} pendente${data.bills.filter(b=>!b.paid).length!==1?'s':''}</div></div>`;
  }
}

function renderGoals(){
  const el=document.getElementById('goalsList');
  const goals=gg();
  if(!goals.length){el.innerHTML='<div class="emp">Nenhuma meta criada</div>';return;}
  el.innerHTML=goals.map(g=>{
    const p=Math.min(100,Math.round(g.current/g.target*100));
    const rem=Math.max(0,g.target-g.current);
    return`<div class="goal-it">
      <div class="goal-hd">
        <div><div class="goal-name">${g.name}</div>${g.deadline?`<div style="font-size:11px;color:var(--mu);margin-top:2px">Prazo: ${new Date(g.deadline+'T12:00:00').toLocaleDateString('pt-BR')}</div>`:''}</div>
        <div style="display:flex;align-items:center;gap:8px">${g.category?`<span class="goal-tag-sm">${g.category}</span>`:''}<span class="goal-pct">${p}%</span></div>
      </div>
      <div class="ptk"><div class="pfl" style="width:${p}%"></div></div>
      <div class="g-amts"><span>${brl(g.current)} guardado</span><span>Faltam ${brl(rem)}</span><span>Meta: ${brl(g.target)}</span></div>
      <div class="g-acts"><button class="gbtn" onclick="depGoal('${g.id}')">+ Depositar</button><button class="gbtn del" onclick="delGoal('${g.id}')">Remover</button></div>
    </div>`;
  }).join('');
}

function renderInvest(){
  const invs=gi();
  const el=document.getElementById('invList');
  const es=document.getElementById('invSum');
  if(!invs.length){el.innerHTML='<div class="emp">Nenhum ativo cadastrado</div>';if(es)es.innerHTML='';return;}
  const tot=invs.reduce((a,b)=>a+parseFloat(b.value),0);
  const totInv=invs.reduce((a,b)=>a+parseFloat(b.invested||b.value),0);
  const gain=tot-totInv;
  const gp=totInv>0?(gain/totInv)*100:0;
  const maxInv=invs.reduce((mx,i)=>parseFloat(i.value)>parseFloat(mx.value)?i:mx,invs[0]);
  if(es)es.innerHTML=`
    <div class="sc"><div class="sc-lbl">Total atual</div><div class="sc-val b">${brl(tot)}</div><div class="sc-sub">${invs.length} ativo${invs.length!==1?'s':''}</div></div>
    <div class="sc"><div class="sc-lbl">Rendimento total</div><div class="sc-val ${gain>=0?'g':'r'}">${gain>=0?'+':''}${brl(gain)}</div><div class="sc-sub">${ppct(gp)}</div></div>
    <div class="sc"><div class="sc-lbl">Maior posição</div><div class="sc-val p">${brl(maxInv.value)}</div><div class="sc-sub">${maxInv.name}</div></div>`;
  const sorted=[...invs].sort((a,b)=>parseFloat(b.value)-parseFloat(a.value));
  el.innerHTML=sorted.map(i=>{
    const iv=parseFloat(i.invested||i.value),cv=parseFloat(i.value),g=cv-iv,gp2=iv>0?(g/iv)*100:0;
    const sh=tot>0?(cv/tot*100).toFixed(1):0;
    return`<div class="inv-row">
      <div class="inv-ico" style="background:${CL[i.type]||'#6b'}20">${IC2[i.type]||'📌'}</div>
      <div class="inv-inf"><div class="inv-name">${i.name}</div><div class="inv-type">${i.type}${i.institution?' · '+i.institution:''} · ${sh}% da carteira</div></div>
      <div class="inv-r"><div class="inv-val">${brl(cv)}</div><div class="inv-gain ${g>=0?'pos':'neg'}">${g>=0?'+':''}${brl(g)} (${ppct(gp2)})</div></div>
      <button class="xb" onclick="delInv('${i.id}')" style="color:var(--mu2)">&#215;</button>
    </div>`;
  }).join('');
}

function renderHist(data){
  const fr=document.getElementById('fltRow');
  fr.innerHTML=['Todos','Receitas','Despesas','Contas'].map((f,i)=>{
    const keys=['all','income','expense','bill'];
    return`<button class="ftag ${hfilt===keys[i]?'on':''}" onclick="setHF('${keys[i]}')">${f}</button>`;
  }).join('');
  const el=document.getElementById('histList');
  let all=[...data.income.map(i=>({...i,kind:'income'})),...data.expenses.map(e=>({...e,kind:'expense'})),...data.bills.map(b=>({...b,kind:'bill'}))];
  if(hfilt!=='all')all=all.filter(t=>t.kind===hfilt);
  if(!all.length){el.innerHTML='<div class="emp">Nenhuma movimentação</div>';return;}
  el.innerHTML=all.map(t=>`<div class="hist-row">
    <div class="hist-ico" style="background:${CL[t.cat]||'#6b'}18">${IC2[t.cat]||'📌'}</div>
    <div class="hist-inf"><div class="hist-n">${t.name}</div><div class="hist-m">${t.cat} · ${t.kind==='income'?'Receita':t.kind==='expense'?'Despesa':'Conta'}${t.dueDate?' · '+new Date(t.dueDate+'T12:00:00').toLocaleDateString('pt-BR'):''}</div></div>
    <div class="hist-a" style="color:${t.kind==='income'?'var(--gr)':'var(--re)'}">${t.kind==='income'?'+':'-'}${brl(t.value)}</div>
  </div>`).join('');
}

function setHF(f){hfilt=f;render();}

function renderCatChart(data){
  const map={};
  [...data.expenses,...data.bills.filter(b=>b.paid)].forEach(e=>{map[e.cat]=(map[e.cat]||0)+parseFloat(e.value);});
  const lb=Object.keys(map),vl=lb.map(k=>map[k]),cl=lb.map(k=>CL[k]||'#6b6b72');
  const ctx=document.getElementById('catChart');
  if(catCI){catCI.destroy();catCI=null;}if(!lb.length)return;
  catCI=new Chart(ctx,{type:'doughnut',data:{labels:lb,datasets:[{data:vl,backgroundColor:cl,borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{position:'bottom',labels:{color:'#6b6b72',font:{family:'DM Sans',size:10},boxWidth:7,boxHeight:7,padding:10,usePointStyle:true}},tooltip:{callbacks:{label:c=>' '+brl(c.parsed)}}}}});
}

function renderHistChart(){
  const months=[],incs=[],exps=[];
  for(let i=5;i>=0;i--){let m=cm-i,y=cy;if(m<0){m+=12;y--;}const d=gd(m,y);months.push(MN[m].slice(0,3));incs.push(d.income.reduce((a,b)=>a+parseFloat(b.value),0));exps.push(d.expenses.reduce((a,b)=>a+parseFloat(b.value),0)+d.bills.filter(b=>b.paid).reduce((a,b)=>a+parseFloat(b.value),0));}
  const ctx=document.getElementById('histChart');if(histCI){histCI.destroy();histCI=null;}
  histCI=new Chart(ctx,{type:'bar',data:{labels:months,datasets:[{label:'Receita',data:incs,backgroundColor:'rgba(52,199,89,.6)',borderRadius:4},{label:'Gastos',data:exps,backgroundColor:'rgba(255,69,58,.6)',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6b6b72',font:{family:'DM Sans',size:11},boxWidth:7,usePointStyle:true}}},scales:{x:{grid:{display:false},ticks:{color:'#6b6b72',font:{family:'DM Sans',size:11}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b6b72',font:{family:'DM Mono',size:10},callback:v=>'R$'+v.toLocaleString('pt-BR')}}}}});
}

function renderInvChart(){
  const invs=gi();const ctx=document.getElementById('invChart');if(invCI){invCI.destroy();invCI=null;}if(!invs.length)return;
  const map={};invs.forEach(i=>{map[i.type]=(map[i.type]||0)+parseFloat(i.value);});
  const lb=Object.keys(map),vl=lb.map(k=>map[k]),cl=lb.map(k=>CL[k]||'#6b');
  invCI=new Chart(ctx,{type:'doughnut',data:{labels:lb,datasets:[{data:vl,backgroundColor:cl,borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'right',labels:{color:'#6b6b72',font:{family:'DM Sans',size:11},boxWidth:7,padding:12,usePointStyle:true}},tooltip:{callbacks:{label:c=>' '+brl(c.parsed)}}}}});
}

// ACTIONS
function setSalary(){
  const v=parseFloat(document.getElementById('salIn').value)||0;
  const data=gd();data.salary=v;
  const ei=data.income.findIndex(i=>i._salary);
  if(v>0){const e={id:uid(),name:'Salário',value:v,cat:'Salário',_salary:true};if(ei>=0)data.income[ei]=e;else data.income.unshift(e);}
  else if(ei>=0)data.income.splice(ei,1);
  sd(data);
  const ok=document.getElementById('salOk');ok.classList.add('show');setTimeout(()=>ok.classList.remove('show'),2200);
  render();
}

function togBill(id){const data=gd();const b=data.bills.find(x=>x.id===id);if(b){b.paid=!b.paid;sd(data);render();}}
function delIt(list,id){const data=gd();data[list]=data[list].filter(i=>i.id!==id);sd(data);render();}
function delGoal(id){sg(gg().filter(g=>g.id!==id));render();}
function delInv(id){si(gi().filter(i=>i.id!==id));render();}
function depGoal(id){
  const v=parseFloat(prompt('Valor a depositar (R$):'));if(!v||isNaN(v))return;
  const goals=gg();const g=goals.find(x=>x.id===id);
  if(g){g.current=Math.min(g.target,parseFloat(g.current)+v);sg(goals);render();}
}

// MODAL
function openModal(type){
  mtype=type;
  const titles={income:'Nova Receita',expense:'Nova Despesa',bill:'Nova Conta a Pagar',goal:'Nova Meta de Economia',invest:'Novo Ativo'};
  document.getElementById('mTitle').textContent=titles[type];
  const mm=String(cm+1).padStart(2,'0');
  const today=`${cy}-${mm}-${String(new Date().getDate()).padStart(2,'0')}`;
  let h='';
  if(type==='income')h=`<div class="fld"><label>Descrição</label><input id="f-name" placeholder="Ex: Bônus, Freela..."/></div><div class="frow"><div class="fld"><label>Valor (R$)</label><input id="f-val" type="number" step="0.01" placeholder="0,00"/></div><div class="fld"><label>Categoria</label><select id="f-cat">${IC.map(c=>`<option>${c}</option>`).join('')}</select></div></div>`;
  else if(type==='expense')h=`<div class="fld"><label>Descrição</label><input id="f-name" placeholder="Ex: Mercado, Uber..."/></div><div class="frow"><div class="fld"><label>Valor (R$)</label><input id="f-val" type="number" step="0.01" placeholder="0,00"/></div><div class="fld"><label>Categoria</label><select id="f-cat">${EC.map(c=>`<option>${c}</option>`).join('')}</select></div></div>`;
  else if(type==='bill')h=`<div class="fld"><label>Descrição</label><input id="f-name" placeholder="Ex: Aluguel, Energia..."/></div><div class="frow"><div class="fld"><label>Valor (R$)</label><input id="f-val" type="number" step="0.01" placeholder="0,00"/></div><div class="fld"><label>Vencimento</label><input id="f-due" type="date" value="${today}"/></div></div><div class="frow"><div class="fld"><label>Categoria</label><select id="f-cat">${EC.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="fld"><label>Recorrente</label><select id="f-rec"><option value="0">Não</option><option value="1">Sim — copiar pro próximo mês</option></select></div></div>`;
  else if(type==='goal')h=`<div class="fld"><label>Nome da meta</label><input id="f-name" placeholder="Ex: Reserva de emergência..."/></div><div class="frow"><div class="fld"><label>Valor alvo (R$)</label><input id="f-val" type="number" step="0.01" placeholder="0,00"/></div><div class="fld"><label>Já guardei (R$)</label><input id="f-cur" type="number" step="0.01" placeholder="0,00" value="0"/></div></div><div class="frow"><div class="fld"><label>Categoria</label><input id="f-gcat" placeholder="Ex: Emergência, Viagem..."/></div><div class="fld"><label>Prazo (opcional)</label><input id="f-dl" type="date"/></div></div>`;
  else if(type==='invest')h=`<div class="fld"><label>Nome do ativo</label><input id="f-name" placeholder="Ex: Tesouro IPCA+, PETR4..."/></div><div class="fld"><label>Tipo</label><select id="f-type">${IT.map(t=>`<option>${t}</option>`).join('')}</select></div><div class="frow"><div class="fld"><label>Valor investido (R$)</label><input id="f-inv" type="number" step="0.01" placeholder="0,00"/></div><div class="fld"><label>Valor atual (R$)</label><input id="f-val" type="number" step="0.01" placeholder="0,00"/></div></div><div class="frow"><div class="fld"><label>Instituição</label><input id="f-inst" placeholder="Ex: Nubank, XP..."/></div><div class="fld"><label>Data de aplicação</label><input id="f-date" type="date" value="${today}"/></div></div>`;
  document.getElementById('mBody').innerHTML=h;
  document.getElementById('ovl').classList.add('open');
  setTimeout(()=>document.getElementById('f-name')?.focus(),60);
}

function closeModal(){document.getElementById('ovl').classList.remove('open');}
document.getElementById('ovl').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function saveModal(){
  const name=document.getElementById('f-name')?.value.trim();
  const val=parseFloat(document.getElementById('f-val')?.value);

  if(mtype==='invest'){
    const inv=parseFloat(document.getElementById('f-inv')?.value)||val||0;
    if(!name||!inv){toast('Preencha nome e valor investido.');return;}
    const cv=val||inv;
    const invs=gi();
    invs.push({id:uid(),name,type:document.getElementById('f-type')?.value||'Outros',invested:inv,value:cv,institution:document.getElementById('f-inst')?.value||'',date:document.getElementById('f-date')?.value||''});
    si(invs);closeModal();render();toast('Ativo adicionado com sucesso.');return;
  }
  if(mtype==='goal'){
    if(!name||!val||isNaN(val)){toast('Preencha nome e valor alvo.');return;}
    const cur=parseFloat(document.getElementById('f-cur')?.value)||0;
    const goals=gg();
    goals.push({id:uid(),name,target:val,current:cur,category:document.getElementById('f-gcat')?.value||'',deadline:document.getElementById('f-dl')?.value||''});
    sg(goals);closeModal();render();toast('Meta criada com sucesso.');return;
  }
  if(!name||!val||isNaN(val)){toast('Preencha nome e valor.');return;}
  const data=gd();
  const cat=document.getElementById('f-cat')?.value||'Outros';
  if(mtype==='income')data.income.push({id:uid(),name,value:val,cat});
  else if(mtype==='expense')data.expenses.push({id:uid(),name,value:val,cat});
  else if(mtype==='bill'){
    const due=document.getElementById('f-due')?.value||'';
    const rec=document.getElementById('f-rec')?.value==='1';
    data.bills.push({id:uid(),name,value:val,cat,dueDate:due,paid:false});
    if(rec){
      let nm=cm+1,ny=cy;if(nm>11){nm=0;ny++;}
      const nd=gd(nm,ny);
      let nDue='';if(due){const dd=new Date(due+'T12:00:00');dd.setMonth(dd.getMonth()+1);nDue=dd.toISOString().slice(0,10);}
      nd.bills.push({id:uid(),name,value:val,cat,dueDate:nDue,paid:false});sd(nd,nm,ny);
      sd(data);closeModal();render();toast('Conta adicionada + cópia no próximo mês.');return;
    }
  }
  sd(data);closeModal();render();toast('Salvo com sucesso.');
}

// EXPORT EXCEL
function exportExcel(){
  if(typeof XLSX==='undefined'){toast('Aguarde o carregamento da biblioteca.');return;}
  const data=gd(),invs=gi(),goals=gg();
  const inc=data.income.reduce((a,b)=>a+parseFloat(b.value),0);
  const exp=data.expenses.reduce((a,b)=>a+parseFloat(b.value),0);
  const bpd=data.bills.filter(b=>b.paid).reduce((a,b)=>a+parseFloat(b.value),0);
  const bpn=data.bills.filter(b=>!b.paid).reduce((a,b)=>a+parseFloat(b.value),0);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ['MV Financing — Relatório Mensal'],['Mês',MN[cm]+' '+cy],[''],
    ['RESUMO'],['Receita total',inc],['Gastos pagos',exp+bpd],['Contas pendentes',bpn],['Saldo disponível',inc-exp-bpd]
  ]),'Resumo');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Nome','Categoria','Valor'],...data.income.map(i=>[i.name,i.cat,parseFloat(i.value)])]),'Receitas');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Nome','Categoria','Valor'],...data.expenses.map(e=>[e.name,e.cat,parseFloat(e.value)])]),'Despesas');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Nome','Categoria','Valor','Vencimento','Status'],...data.bills.map(b=>[b.name,b.cat,parseFloat(b.value),b.dueDate||'',b.paid?'Pago':'Pendente'])]),'Contas a Pagar');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Nome','Tipo','Instituição','Valor Investido','Valor Atual','Rendimento R$','Rendimento %'],...invs.map(i=>{const iv=parseFloat(i.invested||i.value),cv=parseFloat(i.value),g=cv-iv,gp=iv>0?g/iv*100:0;return[i.name,i.type,i.institution||'',iv,cv,g,gp];})]),'Investimentos');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Nome','Categoria','Meta R$','Guardado R$','Restante R$','%','Prazo'],...goals.map(g=>[g.name,g.category||'',parseFloat(g.target),parseFloat(g.current),Math.max(0,g.target-g.current),Math.round(g.current/g.target*100),g.deadline||''])]),'Metas');
  XLSX.writeFile(wb,`MV_Financing_${MN[cm]}_${cy}.xlsx`);
  toast('Planilha exportada com sucesso.');
}

  </div>
  <h2>Receitas</h2><table><thead><tr><th>Descrição</th><th>Categoria</th><th style="text-align:right">Valor</th></tr></thead><tbody>
  ${data.income.map(i=>`<tr><td>${i.name}</td><td>${i.cat}</td><td style="text-align:right;font-family:monospace">${brl(i.value)}</td></tr>`).join('')||'<tr><td colspan="3" style="color:#999">Nenhuma receita</td></tr>'}

  <script>window.onload=()=>{window.print();}<\/script></body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();
